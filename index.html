    <script>
      // Catch Supabase/IndexedDB "steal" lock error so it doesn't break the app (don't patch console)
      window.addEventListener("unhandledrejection", function(e) {
        try {
          var r = e.reason;
          var name = (r && r.name) || "";
          var msg = (r && (r.message !== undefined ? r.message : r)) || "";
          msg = typeof msg === "string" ? msg : String(msg);
          if (name === "AbortError" || msg.indexOf("steal") !== -1 || msg.indexOf("Lock broken") !== -1) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        } catch (_) {}
      }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
